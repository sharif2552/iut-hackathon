services:
  backend:
    build:
      context: .
      target: backend
    env_file:
      - "/Users/sadik/Downloads/backend.env"
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: file:/data/local.db
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    volumes:
      - backend-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: .
      target: frontend
    env_file:
      - "/Users/sadik/Downloads/frontend.env"
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_SOCKET_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
