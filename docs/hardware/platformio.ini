; PlatformIO project for the representative-room ESP32 firmware.
; Build with:  pio run   (from docs/hardware/)
; Then use the Wokwi VS Code extension: "Wokwi: Start Simulator".
;
; src_dir = . lets PlatformIO compile sketch.ino in this folder directly,
; so there is only one copy of the firmware (also pasteable on wokwi.com).

[platformio]
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
