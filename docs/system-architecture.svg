<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <style>
      .box { fill:#111726; stroke:#233048; stroke-width:2; rx:14; }
      .title { fill:#e5edff; font-size:16px; font-weight:700; }
      .sub { fill:#93a4c4; font-size:12px; }
      .flow { stroke:#38bdf8; stroke-width:2.5; fill:none; }
      .flowGreen { stroke:#34d399; stroke-width:2.5; fill:none; }
      .lbl { fill:#7dd3fc; font-size:11px; }
      .lblG { fill:#6ee7b7; font-size:11px; }
      .hdr { fill:#38bdf8; font-size:22px; font-weight:800; }
      .note { fill:#64748b; font-size:11px; }
    </style>
  </defs>

  <rect width="1180" height="720" fill="#0a0e1a"/>
  <text x="40" y="46" class="hdr">Office Energy Monitor — Local-First Architecture</text>
  <text x="40" y="68" class="note">Everything runs on one laptop. The backend is the single source of truth. No deployment, no tunnels, no public URLs.</text>

  <!-- Simulator -->
  <rect x="40" y="110" width="230" height="120" class="box" rx="14"/>
  <text x="60" y="145" class="title">Device Simulator</text>
  <text x="60" y="168" class="sub">6 believable scenarios</text>
  <text x="60" y="186" class="sub">changes a few devices / tick</text>
  <text x="60" y="204" class="sub">persists state-change events</text>

  <!-- Backend big box -->
  <rect x="360" y="90" width="360" height="360" class="box" rx="16" stroke="#38bdf8"/>
  <text x="380" y="122" class="title">Backend API — Source of Truth</text>
  <text x="380" y="142" class="sub">Fastify · TypeScript · Socket.IO · Zod</text>

  <rect x="380" y="158" width="150" height="70" class="box" rx="10"/>
  <text x="396" y="186" class="sub">SQLite +</text>
  <text x="396" y="204" class="sub">Drizzle ORM</text>

  <rect x="550" y="158" width="150" height="70" class="box" rx="10"/>
  <text x="566" y="186" class="sub">Power / Energy</text>
  <text x="566" y="204" class="sub">calculations</text>

  <rect x="380" y="244" width="150" height="70" class="box" rx="10"/>
  <text x="396" y="272" class="sub">Alert Engine</text>
  <text x="396" y="290" class="sub">deterministic rules</text>

  <rect x="550" y="244" width="150" height="70" class="box" rx="10"/>
  <text x="566" y="272" class="sub">AI Composer</text>
  <text x="566" y="290" class="sub">Groq / template</text>

  <rect x="380" y="330" width="320" height="70" class="box" rx="10" stroke="#34d399"/>
  <text x="396" y="358" class="sub">REST  /api/v1/...   +   Socket.IO events</text>
  <text x="396" y="378" class="sub">office:summary.updated · device:updated · alert:created …</text>

  <!-- Dashboard -->
  <rect x="820" y="110" width="320" height="130" class="box" rx="14"/>
  <text x="840" y="145" class="title">Web Dashboard</text>
  <text x="840" y="168" class="sub">React · Vite · Tailwind · Recharts</text>
  <text x="840" y="186" class="sub">live cards, device grid, 2D office map</text>
  <text x="840" y="204" class="sub">updates without refresh (Socket.IO)</text>
  <text x="840" y="222" class="sub">reconnect + error states</text>

  <!-- Discord bot -->
  <rect x="820" y="300" width="320" height="130" class="box" rx="14"/>
  <text x="840" y="335" class="title">Discord Bot (local)</text>
  <text x="840" y="358" class="sub">discord.js Gateway (outbound WS)</text>
  <text x="840" y="376" class="sub">!status !room !usage !alerts</text>
  <text x="840" y="394" class="sub">calls localhost backend for facts</text>
  <text x="840" y="412" class="sub">subscribes to alerts → proactive posts</text>

  <!-- Discord cloud + user -->
  <rect x="820" y="480" width="150" height="90" class="box" rx="14"/>
  <text x="840" y="512" class="title">Discord</text>
  <text x="840" y="534" class="sub">Gateway +</text>
  <text x="840" y="550" class="sub">Servers</text>

  <rect x="990" y="480" width="150" height="90" class="box" rx="14"/>
  <text x="1010" y="512" class="title">Users</text>
  <text x="1010" y="534" class="sub">team in the</text>
  <text x="1010" y="550" class="sub">office channel</text>

  <!-- Flows -->
  <!-- simulator -> backend -->
  <path class="flow" d="M270,170 L360,180" marker-end="url(#arrow)"/>
  <text x="278" y="162" class="lbl">writes device state</text>

  <!-- backend -> dashboard (HTTP+socket) -->
  <path class="flow" d="M720,175 L820,175" marker-end="url(#arrow)"/>
  <text x="726" y="166" class="lbl">HTTP + Socket.IO</text>

  <!-- dashboard -> backend (fetch) -->
  <path class="flowGreen" d="M820,205 L722,215" marker-end="url(#arrowGreen)"/>
  <text x="726" y="232" class="lblG">REST fetch</text>

  <!-- backend <-> bot -->
  <path class="flowGreen" d="M820,345 L722,340" marker-end="url(#arrowGreen)"/>
  <text x="724" y="330" class="lblG">GET facts (localhost)</text>
  <path class="flow" d="M720,395 L820,390" marker-end="url(#arrow)"/>
  <text x="724" y="414" class="lbl">alert:created push</text>

  <!-- bot <-> discord -->
  <path class="flow" d="M900,430 L895,480" marker-end="url(#arrow)"/>
  <text x="905" y="460" class="lbl">outbound WS</text>

  <!-- discord <-> user -->
  <path class="flow" d="M970,525 L990,525" marker-end="url(#arrow)"/>
  <path class="flowGreen" d="M990,545 L972,545" marker-end="url(#arrowGreen)"/>

  <!-- runtime flow legend -->
  <rect x="40" y="300" width="290" height="150" class="box" rx="12"/>
  <text x="58" y="328" class="title">!status runtime flow</text>
  <text x="58" y="352" class="sub">1. User types !status in Discord</text>
  <text x="58" y="372" class="sub">2. Discord Gateway → local bot</text>
  <text x="58" y="392" class="sub">3. Bot → http://localhost:4000</text>
  <text x="58" y="412" class="sub">4. Backend facts → Groq/template</text>
  <text x="58" y="432" class="sub">5. Bot replies in the channel</text>

  <text x="40" y="640" class="note">Data-flow: device state change → simulator → backend (SQLite + services) → Socket.IO → dashboard (live) AND → Discord bot → user.</text>
  <text x="40" y="662" class="note">The dashboard and the Discord bot always reflect the same numbers because they read from the same backend.</text>
  <text x="40" y="684" class="note">Groq only rewrites already-verified facts into friendly wording; it never decides device state, usage, or alerts.</text>
</svg>
